version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: ttd-postgres
    environment:
      POSTGRES_USER: ttd
      POSTGRES_PASSWORD: ttd
      POSTGRES_DB: talktodata
    ports:
      - "5432:5432"
    volumes:
      - ttd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttd -d talktodata"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend (for development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ttd-backend
    environment:
      DATABASE_URL: postgresql://ttd:ttd@db:5432/talktodata
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  ttd_pgdata:
